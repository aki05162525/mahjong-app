name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1
        with:
          version: v2.109.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Start local database
        run: supabase db start

      - name: Test database
        run: supabase test db

      - name: Check database types are up to date
        run: |
          pnpm db:types
          git diff --exit-code src/lib/database.types.ts

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm exec tsc --noEmit

      - name: Format check
        run: pnpm format:check

      - name: Test
        run: pnpm test
